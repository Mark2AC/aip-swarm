# Simulated world definition. All units in metres. World is axis-aligned in
# the `map` frame. Obstacles are axis-aligned rectangles (x_min, y_min,
# x_max, y_max) — simple enough to ray-cast analytically.

world:
  size_x: 20.0
  size_y: 20.0
  origin_x: -10.0
  origin_y: -10.0
  resolution: 0.05           # 5 cm/cell for the OccupancyGrid publish
  obstacles:
    - [-8.0, -8.0, 8.0, -7.8]   # south wall
    - [-8.0,  7.8, 8.0,  8.0]   # north wall
    - [-8.0, -8.0, -7.8, 8.0]   # west wall
    - [ 7.8, -8.0,  8.0, 8.0]   # east wall
    - [-3.0, -1.0, -1.0, 1.0]   # pillar 1
    - [ 2.0,  3.0,  4.0, 5.0]   # pillar 2
    - [-1.0, -5.0,  3.0,-4.0]   # long bar
